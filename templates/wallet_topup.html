{% extends "base.html" %}
{% block title %}Top up wallet — Marketplace{% endblock %}
{% block content %}
<div class="auth-shell card-panel">
  <h2>Top up your wallet</h2>
  <p style="font-size:0.85rem; color:rgba(36,26,18,0.6); margin-bottom:16px;">
    This is a demo top-up for the assignment — it credits your wallet directly rather than charging a real card.
  </p>
  <form method="post">
    <div class="form-field"><label for="amount">Amount (USD)</label><input type="number" id="amount" name="amount" min="1" max="1000" step="0.01" value="20.00" required></div>
    <button type="submit" class="btn btn-brass btn-block">Add funds</button>
  </form>
</div>
{% endblock %}
