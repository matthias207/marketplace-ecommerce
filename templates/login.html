{% extends "base.html" %}
{% block title %}Log in — Marketplace{% endblock %}
{% block content %}
<div class="auth-shell card-panel">
  <h2>Log in</h2>
  <form method="post">
    <div class="form-field"><label for="email">Email</label><input type="email" id="email" name="email" required></div>
    <div class="form-field"><label for="password">Password</label><input type="password" id="password" name="password" required></div>
    <button type="submit" class="btn btn-brass btn-block">Log in</button>
  </form>
  <p style="margin-top:16px; font-size:0.9rem;">New here? <a href="{{ url_for('register') }}" style="color:var(--wine); font-weight:600;">Create a customer account</a> or <a href="{{ url_for('vendor_register') }}" style="color:var(--wine); font-weight:600;">open a vendor store</a>.</p>
</div>
{% endblock %}
