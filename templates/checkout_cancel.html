{% extends "base.html" %}
{% block title %}Checkout canceled — Marketplace{% endblock %}
{% block content %}
<section class="container" style="padding-top:60px; max-width:560px; text-align:center;">
  <h2>No charge was made.</h2>
  <p style="color:rgba(36,26,18,0.65);">Your checkout was canceled. Your cart is still saved if you'd like to try again.</p>
  <a href="{{ url_for('cart_view') }}" class="btn btn-brass" style="margin-top:18px;">Return to cart</a>
</section>
{% endblock %}
